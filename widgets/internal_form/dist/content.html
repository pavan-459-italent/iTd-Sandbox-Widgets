<style>
  .internal-notes-widget {
    box-sizing: border-box;
    width: 100%;
    max-width: 420px;
    min-height: 420px;
    display: flex;
    flex-direction: column;
    border: 1px solid #d9e1ec;
    border-radius: 14px;
    background: linear-gradient(180deg, #ffffff 0%, #fbfcfe 100%);
    box-shadow: 0 10px 24px rgba(17, 38, 78, 0.06);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #173057;
    padding: 20px;
    gap: 14px;
  }

  .internal-notes-title {
    margin: 0;
    font-size: 24px;
    font-weight: 700;
    line-height: 1.2;
  }

  .internal-notes-copy {
    margin: 0;
    color: #5d6f8a;
    font-size: 13px;
    line-height: 1.5;
  }

  .internal-notes-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
  }

  .internal-notes-text,
  .internal-notes-input {
    width: 100%;
    box-sizing: border-box;
    border: 1px solid #cfd8e6;
    border-radius: 10px;
    background: #ffffff;
    padding: 12px 13px;
    font: inherit;
    color: #173057;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  .internal-notes-text {
    min-height: 42px;
  }

  .internal-notes-input {
    flex: 1;
    min-height: 180px;
    resize: vertical;
  }

  .internal-notes-text:focus,
  .internal-notes-input:focus {
    border-color: #6c8fcb;
    box-shadow: 0 0 0 3px rgba(83, 121, 191, 0.14);
  }

  .internal-notes-text::placeholder,
  .internal-notes-input::placeholder {
    color: #8a9ab0;
  }

  .internal-notes-status {
    min-height: 20px;
    margin: 0;
    font-size: 12px;
    line-height: 1.4;
    color: #5d6f8a;
  }

  .internal-notes-status[data-tone="error"] {
    color: #9f1c13;
  }

  .internal-notes-status[data-tone="success"] {
    color: #1d6b3d;
  }

  .internal-notes-submit {
    width: 100%;
    border: 0;
    border-radius: 10px;
    padding: 11px 14px;
    background: #9f1c13;
    color: #ffffff;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background-color 0.2s ease, transform 0.2s ease;
  }

  .internal-notes-submit:hover {
    background: #84150d;
    transform: translateY(-1px);
  }

  .internal-notes-submit:active {
    transform: translateY(0);
  }

  .internal-notes-submit:disabled {
    cursor: wait;
    opacity: 0.7;
    transform: none;
  }
</style>

<div class="internal-notes-widget" data-admin-widget hidden>
  <h1 class="internal-notes-title">Internal Notes</h1>
  <p class="internal-notes-copy">Create a private note as an idea entry for internal moderation workflows.</p>

  <div class="internal-notes-form">
    <input
      id="internal-notes-title"
      class="internal-notes-text"
      type="text"
      placeholder="Enter title"
    />

    <textarea
      id="internal-notes-message"
      class="internal-notes-input"
      placeholder="Write your internal note here..."
    ></textarea>

    <p class="internal-notes-status" data-status></p>
    <button class="internal-notes-submit" type="button">Submit</button>
  </div>
</div>

<script src="https://static.customer-hub.northpass.com/widget-sdk/latest/index.umd.js"></script>
<script type="module">
  export async function init(sdk) {
    await sdk.whenReady();

    var widget = sdk.root.querySelector("[data-admin-widget]");
    var titleInput = sdk.root.querySelector("#internal-notes-title");
    var messageInput = sdk.root.querySelector("#internal-notes-message");
    var statusNode = sdk.root.querySelector("[data-status]");
    var submitButton = sdk.root.querySelector(".internal-notes-submit");
    var connectorsSDK =
      typeof window.WidgetServiceSDK === "function" ? new window.WidgetServiceSDK() : null;

    if (!widget || !titleInput || !messageInput || !statusNode || !submitButton) {
      return;
    }

    function setStatus(message, tone) {
      statusNode.textContent = message || "";
      if (tone) {
        statusNode.setAttribute("data-tone", tone);
      } else {
        statusNode.removeAttribute("data-tone");
      }
    }

    var inSidedData = window.inSidedData || {};
    var user = inSidedData.user || {};
    var role = user.mainRole || '';
    console.log("logs from internal form widget, ")
    // console.log("User id>>>>>>>>>", user.userid);
    // console.log("number user id>>>>>>>>>", Number(user.userid));
    if (role !== "roles.administrator") {
       //widget.textContent = "You do not have permission to view this widget.";
      return;
    }

    widget.hidden = false;

    async function submitInternalNote() {
      var title = titleInput.value.trim();
      var content = messageInput.value.trim();

      if (!title || !content) {
        setStatus("Title and note content are required.", "error");
        return;
      }

      var payload = {
        title: title,
        content: content,
        productAreaIds: "",
        tags: [],
        categoryId: 66,
        sticky: false,
        closed: false,
        moderatorTags: []
      };

      submitButton.disabled = true;
      setStatus("Submitting internal note...", null);

      try {
        if (!connectorsSDK || !connectorsSDK.connectors || typeof connectorsSDK.connectors.execute !== "function") {
          throw new Error("Connector SDK is unavailable on this page.");
        }

        var result = await connectorsSDK.connectors.execute({
          permalink: "post-idea-internal-notes",
          method: "POST",
          payload: payload,
        });
        
        /*
        queryParams: {
          authorId : Number(user.userid)
        }
        var response = await fetch(
          "https://italent-us-community.insided.com/widget-service/connectors/post-idea-internal-notes/execute",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          }
        );

        var responseText = await response.text();
        var responseBody = responseText;

        try {
          responseBody = responseText ? JSON.parse(responseText) : null;
        } catch (parseError) {
          responseBody = responseText;
        }

        if (!response.ok) {
          throw new Error(
            "HTTP " + response.status + " " + response.statusText + "\n" + JSON.stringify(responseBody)
          );
        }
        */

        titleInput.value = "";
        messageInput.value = "";
        setStatus("Internal note submitted successfully.", "success");
        console.log(result, "Internal note submission result");
      } catch (error) {
        var message = error && error.message ? error.message : "Unknown error";
        setStatus("Submission failed: " + message, "error");
      } finally {
        submitButton.disabled = false;
      }
    }

    submitButton.addEventListener("click", function (event) {
      event.preventDefault();
      event.stopPropagation();
      submitInternalNote();
    });
  }
</script>
