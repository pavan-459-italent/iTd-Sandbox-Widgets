<style>
  .internal-notes-widget {
    box-sizing: border-box;
    width: 350px;
    height: 400px;
    display: flex;
    flex-direction: column;
    border: 1px solid #d9e1ec;
    border-radius: 14px;
    background: linear-gradient(180deg, #ffffff 0%, #fbfcfe 100%);
    box-shadow: 0 10px 24px rgba(17, 38, 78, 0.06);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #173057;
    padding: 20px;
    gap: 14px;
  }

  .internal-notes-title {
    margin: 0;
    font-size: 24px;
    font-weight: 700;
    line-height: 1.2;
  }

  .internal-notes-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
  }

  .internal-notes-text,
  .internal-notes-input {
    width: 100%;
    box-sizing: border-box;
    border: 1px solid #cfd8e6;
    border-radius: 10px;
    background: #ffffff;
    padding: 12px 13px;
    font: inherit;
    color: #173057;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  .internal-notes-text {
    min-height: 42px;
  }

  .internal-notes-input {
    flex: 1;
    min-height: 0;
    resize: none;
  }

  .internal-notes-text:focus,
  .internal-notes-input:focus {
    border-color: #6c8fcb;
    box-shadow: 0 0 0 3px rgba(83, 121, 191, 0.14);
  }

  .internal-notes-text::placeholder,
  .internal-notes-input::placeholder {
    color: #8a9ab0;
  }

  .internal-notes-submit {
    width: 100%;
    border: 0;
    border-radius: 10px;
    padding: 11px 14px;
    background: #9f1c13;
    color: #ffffff;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background-color 0.2s ease, transform 0.2s ease;
  }

  .internal-notes-submit:hover {
    background: #84150d;
    transform: translateY(-1px);
  }

  .internal-notes-submit:active {
    transform: translateY(0);
  }

  .internal-notes-submit:disabled {
    cursor: wait;
    opacity: 0.7;
    transform: none;
  }
</style>

<div class="internal-notes-widget" data-admin-widget hidden>
  <h1 class="internal-notes-title">Internal Notes</h1>

  <div class="internal-notes-form">
    <input
      id="internal-notes-title"
      class="internal-notes-text"
      type="text"
      placeholder="Enter title"
    />

    <textarea
      id="internal-notes-message"
      class="internal-notes-input"
      placeholder="Write your internal note here..."
    ></textarea>

    <button class="internal-notes-submit" type="button">Submit</button>
  </div>
</div>
